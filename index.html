<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>황하연 · 웹 명함</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&family=Outfit:wght@500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="scene">
    <article class="card" id="card">
      <div class="card__glow" aria-hidden="true"></div>

      <header class="card__header">
        <div class="avatar" aria-label="일러스트 프로필">
          <img
            class="avatar__img avatar__img--illustration"
            src="images/avatar-illustration.png"
            alt="황하연 일러스트 프로필"
            width="100"
            height="100"
            loading="eager"
          >
        </div>
        <div class="card__identity">
          <p class="card__role">PM / PO</p>
          <h1 class="card__name">황하연</h1>
        </div>
      </header>

      <p class="card__tagline">사용자와 비즈니스를 잇는 제품을 만듭니다.</p>

      <ul class="card__contacts">
        <li>
          <a href="mailto:airbody@gmail.com" class="contact" data-copy="airbody@gmail.com">
            <span class="contact__icon" aria-hidden="true">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 6h16v12H4z"/><path d="M4 6l8 7 8-7"/></svg>
            </span>
            <span class="contact__text">airbody@gmail.com</span>
          </a>
        </li>
        <li>
          <a href="tel:01088813111" class="contact" data-copy="010-8881-3111">
            <span class="contact__icon" aria-hidden="true">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 4h4l2 5-2.5 1.5a11 11 0 005 5L16 13l5 2v4a2 2 0 01-2 2A14 14 0 016 6a2 2 0 012-2z"/></svg>
            </span>
            <span class="contact__text">010-8881-3111</span>
          </a>
        </li>
      </ul>

      <footer class="card__footer">
        <button type="button" class="btn-copy" id="copyBtn" aria-label="연락처 복사">
          연락처 복사
        </button>
      </footer>
    </article>

    <p class="toast" id="toast" role="status" aria-live="polite"></p>
  </main>

  <script src="script.js"></script>
</body>
</html>
